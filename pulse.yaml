# pulse.yaml — fichero de configuración de ejemplo
# Ejecutar: pulse check -c pulse.yaml

targets:
  - name: google
    url: https://www.google.com
    expected_status: 200
    max_latency_ms: 500

  - name: github
    url: https://github.com
    expected_status: 200
    max_latency_ms: 1000

  - name: api-interno
    url: https://api.example.com/health
    expected_status: 200
    max_latency_ms: 800
