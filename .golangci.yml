version: "2"

linters:
  enable:
    - errcheck
    - gocritic
    - gosec
    - revive
    - govet
    - staticcheck
    - bodyclose
    - noctx

formatters:
  enable:
    - gofumpt
  settings:
    revive:
      severity: warning
      rules:
        - name: exported
        - name: var-naming
        - name: unused-parameter
    gosec:
      excludes:
        - G104 # audit errors — manejamos explícitamente
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*database/sql.Tx).Rollback
  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - gosec
          - errcheck
